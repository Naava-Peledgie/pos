{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - INTENT POS</title>
    <link rel="stylesheet" href="{% static 'core/css/bootstrap.min.css' %}">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary shadow-sm mb-4">
        <div class="container">
            <span class="navbar-brand fw-bold">INTENT POS</span>
            <div class="text-white">User: {{ user_name }} | <a href="{% url 'logout' %}" class="text-white text-decoration-none">Logout</a></div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <div class="p-5 bg-white rounded-3 shadow-sm border-0">
                    <h1 class="display-6">Welcome to your Dashboard</h1>
                    <p class="text-muted">System Status: <span class="badge bg-success">{{ status }}</span></p>
                    <hr>
                    <div class="row mt-4">
                        <div class="col-md-4">
                            <div class="card bg-primary text-white border-0 shadow-sm">
                                <div class="card-body">
                                    <h6>Total Products</h6>
                                    <h3>0</h3>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
