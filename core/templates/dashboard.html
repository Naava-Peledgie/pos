{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermarket POS - Dashboard</title>
    <link rel="stylesheet" href="{% static 'core/css/bootstrap.min.css' %}">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">INTENT POS</span>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body text-center">
                        <h5 class="text-muted">Inventory</h5>
                        <h2 class="text-primary">{{ total_products }} Items</h2>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'core/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
